<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPSC PYQ Practice</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.header{background:#fff;border-bottom:1px solid #e0e0e0;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:100}
.logo{font-size:20px;font-weight:700;color:#1a1a1a}
.logo span{color:#2563eb}
.stats{display:flex;gap:20px}
.stat{text-align:center}
.stat-num{font-size:22px;font-weight:700;color:#2563eb}
.stat-label{font-size:11px;color:#888}
.filters{background:#fff;border-bottom:1px solid #e0e0e0;padding:0.75rem 1.5rem;display:flex;gap:10px;flex-wrap:wrap;align-items:center;position:sticky;top:65px;z-index:99}
.filters select{height:36px;padding:0 10px;border-radius:8px;border:1px solid #d0d0d0;background:#fff;color:#1a1a1a;font-size:13px;cursor:pointer}
.filters select:focus{outline:none;border-color:#2563eb}
.btn-reset{height:36px;padding:0 14px;border-radius:8px;border:1px solid #d0d0d0;background:#fff;color:#555;font-size:13px;cursor:pointer}
.btn-reset:hover{background:#f5f5f5}
.mode-toggle{margin-left:auto;display:flex;gap:6px}
.mode-btn{height:36px;padding:0 16px;border-radius:8px;border:1px solid #d0d0d0;background:#fff;color:#555;font-size:13px;cursor:pointer;font-weight:500}
.mode-btn.active{background:#eff6ff;color:#2563eb;border-color:#93c5fd}
.main{padding:1.25rem 1.5rem;max-width:900px;margin:0 auto}
.results-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.results-count{font-size:13px;color:#888}
.score-bar{display:flex;align-items:center;gap:8px;font-size:13px;color:#555}
.score-val{font-weight:700;color:#2563eb;font-size:16px}
.q-card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.q-meta{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.badge-subject{background:#eff6ff;color:#1d4ed8}
.badge-topic{background:#f0fdf4;color:#15803d}
.badge-exam{background:#fffbeb;color:#b45309}
.badge-year{background:#f5f5f5;color:#555;border:1px solid #e0e0e0}
.q-num{font-size:11px;color:#aaa;margin-bottom:6px}
.q-text{font-size:14px;line-height:1.8;color:#1a1a1a;white-space:pre-line;margin-bottom:1rem}
.options{display:grid;gap:8px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:8px;border:1px solid #e0e0e0;font-size:13px;line-height:1.6;color:#1a1a1a;background:#fafafa;transition:all 0.15s}
.opt.clickable{cursor:pointer}
.opt.clickable:hover{border-color:#93c5fd;background:#eff6ff}
.opt.correct{border-color:#86efac;background:#f0fdf4}
.opt.wrong{border-color:#fca5a5;background:#fef2f2}
.opt-label{font-weight:700;min-width:20px;color:#888}
.opt.correct .opt-label{color:#15803d}
.opt.wrong .opt-label{color:#dc2626}
.opt.clickable:hover .opt-label{color:#2563eb}
.q-actions{margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn-reveal{height:32px;padding:0 14px;border-radius:8px;border:1px solid #93c5fd;background:#fff;color:#2563eb;font-size:12px;cursor:pointer;font-weight:500}
.btn-reveal:hover{background:#eff6ff}
.answer-badge{font-size:12px;padding:4px 14px;border-radius:20px;background:#f0fdf4;color:#15803d;font-weight:600;border:1px solid #86efac}
.loading{text-align:center;padding:3rem;color:#888;font-size:15px}
.empty{text-align:center;padding:3rem;color:#888}
.error{background:#fef2f2;border:1px solid #fca5a5;border-radius:12px;padding:1rem 1.25rem;color:#dc2626;font-size:13px;margin-bottom:1rem}
@media(max-width:600px){
  .header{padding:0.75rem 1rem}
  .filters{padding:0.75rem 1rem;top:60px}
  .main{padding:1rem}
  .stats{gap:12px}
  .stat-num{font-size:18px}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">UPSC <span>PYQ</span> Practice</div>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="s-total">—</div><div class="stat-label">Questions</div></div>
    <div class="stat"><div class="stat-num" id="s-correct">0</div><div class="stat-label">Correct</div></div>
    <div class="stat"><div class="stat-num" id="s-attempted">0</div><div class="stat-label">Attempted</div></div>
  </div>
</div>

<div class="filters">
  <select id="f-subject" onchange="updateTopics();applyFilters()"><option value="">All Subjects</option></select>
  <select id="f-topic" onchange="applyFilters()"><option value="">All Topics</option></select>
  <select id="f-exam" onchange="applyFilters()"><option value="">All Exams</option></select>
  <select id="f-year" onchange="applyFilters()"><option value="">All Years</option></select>
  <button class="btn-reset" onclick="resetFilters()">↺ Reset</button>
  <div class="mode-toggle">
    <button class="mode-btn active" id="mode-practice" onclick="setMode('practice')">Practice</button>
    <button class="mode-btn" id="mode-quiz" onclick="setMode('quiz')">Quiz</button>
  </div>
</div>

<div class="main">
  <div class="results-bar">
    <div class="results-count" id="results-count"></div>
    <div class="score-bar" id="score-bar" style="display:none">Score: <span class="score-val" id="score-display">0/0</span></div>
  </div>
  <div id="questions-container"><div class="loading">Loading questions from your sheet...</div></div>
</div>

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbzrtVqa1c0KexAlqguE-uVjt7SK5NnlXmR3zuRFmAwkS2V9GVgC2hRd44FKird3XF6F/exec";

let allQuestions = [];
let filtered = [];
let mode = 'practice';
let attempted = {};
let correct = 0;
let attemptedCount = 0;

async function init() {
  try {
    const r = await fetch(SHEET_URL);
    const data = await r.json();
    allQuestions = data;
    populateFilters();
    applyFilters();
    document.getElementById('s-total').textContent = allQuestions.length;
  } catch(e) {
    document.getElementById('questions-container').innerHTML =
      '<div class="error">Could not load questions. Check your internet connection and try refreshing.</div>';
  }
}

function populateFilters() {
  const subjects = [...new Set(allQuestions.map(q=>q.Subject).filter(Boolean))].sort();
  const exams = [...new Set(allQuestions.map(q=>q.Exam).filter(Boolean))].sort();
  const years = [...new Set(allQuestions.map(q=>String(q.Year)).filter(Boolean))].sort((a,b)=>b-a);
  fillSelect('f-subject', subjects);
  fillSelect('f-exam', exams);
  fillSelect('f-year', years);
  updateTopics();
}

function fillSelect(id, vals) {
  const sel = document.getElementById(id);
  const cur = sel.value;
  while(sel.options.length > 1) sel.remove(1);
  vals.forEach(v => sel.add(new Option(v,v)));
  if(vals.includes(cur)) sel.value = cur;
}

function updateTopics() {
  const subj = document.getElementById('f-subject').value;
  const topics = [...new Set(allQuestions
    .filter(q => !subj || q.Subject === subj)
    .map(q=>q.Topic).filter(Boolean))].sort();
  fillSelect('f-topic', topics);
}

function applyFilters() {
  const subj = document.getElementById('f-subject').value;
  const topic = document.getElementById('f-topic').value;
  const exam = document.getElementById('f-exam').value;
  const year = document.getElementById('f-year').value;
  filtered = allQuestions.filter(q =>
    (!subj || q.Subject === subj) &&
    (!topic || q.Topic === topic) &&
    (!exam || q.Exam === exam) &&
    (!year || String(q.Year) === year)
  );
  document.getElementById('results-count').textContent =
    `Showing ${filtered.length} of ${allQuestions.length} questions`;
  renderQuestions();
}

function resetFilters() {
  ['f-subject','f-topic','f-exam','f-year'].forEach(id => document.getElementById(id).value = '');
  updateTopics();
  applyFilters();
}

function setMode(m) {
  mode = m;
  document.getElementById('mode-practice').classList.toggle('active', m==='practice');
  document.getElementById('mode-quiz').classList.toggle('active', m==='quiz');
  document.getElementById('score-bar').style.display = m==='quiz' ? 'flex' : 'none';
  attempted = {}; correct = 0; attemptedCount = 0;
  updateStats();
  renderQuestions();
}

function renderQuestions() {
  const c = document.getElementById('questions-container');
  if(!filtered.length){c.innerHTML='<div class="empty">No questions found for selected filters.</div>';return;}
  c.innerHTML = filtered.map((q,i) => {
    const opts = ['A','B','C','D'];
    const optVals = [q['Option A']||q.OptionA, q['Option B']||q.OptionB, q['Option C']||q.OptionC, q['Option D']||q.OptionD];
    const state = attempted[q['Q.No']||q.QNo];
    const ans = q.Answer;
    const optHtml = opts.map((l,oi) => {
      if(!optVals[oi] || optVals[oi]==='-') return '';
      let cls = 'opt';
      if(state){
        if(l===ans) cls+=' correct';
        else if(l===state && state!==ans) cls+=' wrong';
      } else if(mode==='quiz') cls+=' clickable';
      const qno = q['Q.No']||q.QNo;
      const onclick = (mode==='quiz'&&!state) ? `selectAnswer('${qno}','${l}')` : '';
      return `<div class="${cls}" ${onclick?`onclick="${onclick}"`:''}><span class="opt-label">${l}.</span><span>${optVals[oi]}</span></div>`;
    }).join('');
    const qno = q['Q.No']||q.QNo;
    const revealBtn = mode==='practice'&&!state
      ? `<button class="btn-reveal" onclick="revealAnswer('${qno}')">Show answer</button>` : '';
    const answerBadge = (state) ? `<span class="answer-badge">✓ Answer: ${ans}</span>` : '';
    return `<div class="q-card">
      <div class="q-meta">
        <span class="badge badge-subject">${q.Subject||''}</span>
        <span class="badge badge-topic">${q.Topic||''}</span>
        <span class="badge badge-exam">${q.Exam||''}</span>
        <span class="badge badge-year">${q.Year||''}</span>
      </div>
      <div class="q-num">Q${i+1}</div>
      <div class="q-text">${q.Question||''}</div>
      <div class="options">${optHtml}</div>
      <div class="q-actions">${revealBtn}${answerBadge}</div>
    </div>`;
  }).join('');
}

function selectAnswer(qno, chosen) {
  if(attempted[qno]) return;
  const q = allQuestions.find(x=>(x['Q.No']||x.QNo)==qno);
  if(!q) return;
  attempted[qno] = chosen;
  attemptedCount++;
  if(chosen===q.Answer) correct++;
  updateStats();
  renderQuestions();
}

function revealAnswer(qno) {
  attempted[qno] = '__revealed__';
  renderQuestions();
}

function updateStats() {
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-attempted').textContent = attemptedCount;
  document.getElementById('score-display').textContent = `${correct}/${attemptedCount}`;
}

init();
</script>
</body>
</html>
